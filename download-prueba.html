<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Descarga APK de prueba</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0f172a;color:#e5e7eb;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
    main{max-width:560px;background:#111827;border:1px solid #334155;border-radius:22px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;font-size:28px}
    p{line-height:1.5;color:#cbd5e1}
    button{width:100%;border:0;border-radius:16px;background:#22c55e;color:#052e16;font-weight:800;font-size:18px;padding:18px;margin-top:18px}
    .small{font-size:13px;color:#94a3b8;margin-top:18px}
    code{background:#020617;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
<main>
  <h1>Prueba APK móvil</h1>
  <p>Esta página descarga un APK real desde el repositorio público y lo entrega al móvil como archivo <code>.apk</code>.</p>
  <button id="btn">Descargar PruebaAPK.apk</button>
  <p id="status" class="small">Pulsa el botón y, cuando termine la descarga, abre el archivo desde Descargas o Mis Archivos.</p>
</main>
<script>
const STATUS = document.getElementById('status');
const APK_B64_URL = 'https://cdn.jsdelivr.net/gh/alberty8384-ctrl/apps-apk-releases@main/encoded/PruebaAPK.apk.b64';

document.getElementById('btn').addEventListener('click', async () => {
  try {
    STATUS.textContent = 'Preparando descarga...';
    const response = await fetch(APK_B64_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!response.ok) throw new Error('No se pudo leer el APK base64: HTTP ' + response.status);
    const b64 = (await response.text()).trim();
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'application/vnd.android.package-archive' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'PruebaAPK.apk';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 15000);
    STATUS.textContent = 'Descarga lanzada. Abre PruebaAPK.apk desde Descargas o Mis Archivos.';
  } catch (err) {
    STATUS.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
